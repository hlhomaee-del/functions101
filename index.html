<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Functions Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--border:rgba(255,255,255,0.08);
  --blue:#5b8dee;--purple:#9b6dff;--pink:#ff6b9d;--green:#4ecdc4;
  --orange:#ff8a50;--red:#ff5252;--yellow:#ffd740;--cyan:#40e0d0;--gold:#ffab40;
  --text:#f5f5f7;--text2:#b0b8d1;--text3:#6b7394;
  --font:'Nunito',sans-serif;--mono:'Fira Code',monospace;
  --r:20px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:18px;line-height:1.75;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(91,141,238,0.07),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(155,109,255,0.05),transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:4px}
.hidden{display:none!important}
.wrap{max-width:900px;margin:0 auto;padding:0 24px;position:relative;z-index:2}
.wrap-wide{max-width:1100px;margin:0 auto;padding:0 24px;position:relative;z-index:2}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:16px 36px;border:none;border-radius:60px;font-family:var(--font);font-weight:800;font-size:17px;cursor:pointer;transition:all .3s;letter-spacing:0.3px}
.btn:hover{transform:translateY(-3px)}.btn:active{transform:scale(0.97)}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 6px 25px rgba(91,141,238,0.3)}
.btn-green{background:linear-gradient(135deg,var(--green),var(--cyan));color:#0a2a27;box-shadow:0 6px 25px rgba(78,205,196,0.3)}
.btn-gold{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#2a1a00;box-shadow:0 6px 25px rgba(255,215,64,0.3)}
.btn-pink{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 6px 25px rgba(255,107,157,0.3)}
.btn-ghost{background:rgba(91,141,238,0.1);color:var(--blue);border:2px solid rgba(91,141,238,0.25)}
.btn-ghost:hover{background:rgba(91,141,238,0.2)}
.btn-sm{padding:11px 24px;font-size:15px}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

/* Nav */
.topnav{position:sticky;top:0;z-index:100;background:rgba(15,15,26,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.topnav .wrap-wide{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-weight:900;font-size:22px;cursor:pointer;display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
.nav-pills{display:flex;align-items:center;gap:14px}
.pill{background:var(--card);border:1px solid var(--border);border-radius:50px;padding:8px 18px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.pill .pv{color:var(--yellow);font-family:var(--mono)}
.xbar{width:140px;height:7px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.xbar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));border-radius:10px;transition:width .8s ease}

/* ═══ PHASES ═══ */
.phase{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 0}
.phase-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:48px;max-width:700px;width:100%;text-align:center;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.phase-card h1{font-weight:900;font-size:36px;margin-bottom:16px;line-height:1.2}
.phase-card h2{font-weight:800;font-size:28px;margin-bottom:14px}
.phase-card p{color:var(--text2);font-size:19px;margin-bottom:24px;line-height:1.8}

/* Warm-up challenge cards */
.challenge{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:44px;max-width:750px;width:100%;animation:fadeUp .5s ease}
.challenge h2{font-weight:800;font-size:26px;margin-bottom:8px}
.challenge .ch-num{font-size:14px;font-weight:700;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.challenge p{color:var(--text2);font-size:18px;margin-bottom:20px;line-height:1.8}
.ch-options{display:flex;flex-direction:column;gap:12px;margin:20px 0}
.ch-opt{background:rgba(255,255,255,0.03);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px 24px;cursor:pointer;transition:all .3s;font-size:17px;font-weight:600;text-align:left}
.ch-opt:hover{border-color:var(--blue);background:rgba(91,141,238,0.06);transform:translateX(4px)}
.ch-opt.picked{border-color:var(--blue);background:rgba(91,141,238,0.1)}
.ch-opt.correct{border-color:var(--green)!important;background:rgba(78,205,196,0.1)!important}
.ch-opt.wrong{border-color:var(--red)!important;background:rgba(255,82,82,0.06)!important}
.ch-opt.done{pointer-events:none}
.ch-fb{margin-top:16px;padding:20px;border-radius:14px;font-size:17px;line-height:1.7;animation:fadeUp .3s ease}
.ch-fb.ok{background:rgba(78,205,196,0.08);border:2px solid rgba(78,205,196,0.2)}
.ch-fb.no{background:rgba(255,82,82,0.06);border:2px solid rgba(255,82,82,0.15)}

/* Code */
.code{background:#0a0a1a;border:2px solid rgba(91,141,238,0.12);border-radius:16px;padding:24px 28px;font-family:var(--mono);font-size:17px;line-height:2.2;overflow-x:auto;margin:16px 0;text-align:left}
.code .ln{color:var(--text3);margin-right:20px;user-select:none;min-width:24px;display:inline-block;text-align:right;font-size:14px}
.code .line{display:block;padding:2px 28px;margin:0 -28px;border-left:4px solid transparent;transition:all .3s}
.code .line.hl{background:rgba(91,141,238,0.1);border-left-color:var(--blue)}
.code .line.hlg{background:rgba(78,205,196,0.08);border-left-color:var(--green)}
.kw{color:#c792ea}.fn{color:#82aaff}.st{color:#c3e88d}.cm{color:#546e7a;font-style:italic}.nm{color:#f78c6c}.bi{color:#89ddff}.pm{color:#ffcb6b}

/* Progress dots */
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:28px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all .3s}
.dot.active{background:var(--blue);box-shadow:0 0 12px rgba(91,141,238,0.4)}
.dot.done{background:var(--green)}

/* Results */
.result-bar{height:12px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.06);margin:8px 0 20px}
.result-fill{height:100%;border-radius:10px;transition:width 1s ease}
.result-fill.high{background:linear-gradient(90deg,var(--green),var(--cyan))}
.result-fill.med{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.result-fill.low{background:linear-gradient(90deg,var(--orange),var(--red))}

/* Prereq cards */
.prereq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:20px 0}
.pq-card{background:rgba(255,255,255,0.03);border:2px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s;text-align:center}
.pq-card:hover{border-color:var(--blue);transform:translateY(-3px)}
.pq-card.mastered{border-color:var(--green);background:rgba(78,205,196,0.06)}
.pq-card .pq-icon{font-size:32px;margin-bottom:8px;display:block}
.pq-card h4{font-weight:700;font-size:16px}
.pq-card p{font-size:13px;color:var(--text3);margin-top:4px}

/* Teach blocks */
.teach{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:36px;margin:28px 0;position:relative;overflow:hidden;font-size:18px}
.teach::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.teach.blue::before{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.teach.purple::before{background:linear-gradient(90deg,var(--purple),var(--pink))}
.teach.green::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.teach.orange::before{background:linear-gradient(90deg,var(--orange),var(--yellow))}
.teach.red::before{background:linear-gradient(90deg,var(--red),var(--pink))}
.teach.gold::before{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.teach.pink::before{background:linear-gradient(90deg,var(--pink),var(--purple))}
.teach h3{font-weight:800;font-size:24px;margin-bottom:14px}
.teach p{color:var(--text2);margin-bottom:14px;font-size:18px;line-height:1.8}
.teach strong{color:var(--text)}

/* Station grid */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;padding-bottom:80px}
.sc{position:relative;border-radius:var(--r);padding:32px;overflow:hidden;cursor:pointer;transition:all .4s;border:2px solid transparent}
.sc:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.sc.locked{opacity:.35;cursor:not-allowed;filter:grayscale(0.5)}.sc.locked:hover{transform:none;box-shadow:none}
.sc[data-i="0"]{background:linear-gradient(135deg,#1a237e,#283593)}
.sc[data-i="1"]{background:linear-gradient(135deg,#4a148c,#6a1b9a)}
.sc[data-i="2"]{background:linear-gradient(135deg,#880e4f,#ad1457)}
.sc[data-i="3"]{background:linear-gradient(135deg,#004d40,#00695c)}
.sc[data-i="4"]{background:linear-gradient(135deg,#1b5e20,#2e7d32)}
.sc[data-i="5"]{background:linear-gradient(135deg,#e65100,#bf360c)}
.sc[data-i="6"]{background:linear-gradient(135deg,#01579b,#0277bd)}
.sc[data-i="7"]{background:linear-gradient(135deg,#f57f17,#f9a825)}
.sc[data-i="8"]{background:linear-gradient(135deg,#b71c1c,#c62828)}
.sc[data-i="9"]{background:linear-gradient(135deg,#1a237e,#0d47a1)}
.sc[data-i="10"]{background:linear-gradient(135deg,#e65100,#ff6f00)}
.sc[data-i="11"]{background:linear-gradient(135deg,#4a148c,#7b1fa2)}
.sc-icon{font-size:44px;margin-bottom:16px;display:block}
.sc-num{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;opacity:0.7;margin-bottom:6px}
.sc h3{font-weight:800;font-size:22px;margin-bottom:8px}
.sc p{font-size:16px;opacity:0.85;margin-bottom:20px}
.sc-bot{display:flex;align-items:center;justify-content:space-between}
.sc-st{font-size:13px;font-weight:700;padding:6px 16px;border-radius:50px}
.sc-st.done{background:rgba(78,205,196,0.25);color:var(--green)}
.sc-st.open{background:rgba(255,255,255,0.15);color:#fff}
.sc-st.lock{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
.sc-ent{font-size:14px;font-weight:700;opacity:0;transition:opacity .3s;color:#fff}.sc:hover .sc-ent{opacity:1}

/* Out, Quiz, etc - same as before */
.out{background:#0a0a1a;border:2px solid rgba(78,205,196,0.2);border-radius:16px;padding:20px 24px;font-family:var(--mono);font-size:16px;min-height:60px;color:var(--green);margin:16px 0}
.out-label{font-family:var(--font);font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.quiz{margin:32px 0;background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:36px}
.quiz-q{font-weight:700;font-size:20px;margin-bottom:20px;line-height:1.6}
.qo{background:rgba(255,255,255,0.03);border:2px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px 24px;cursor:pointer;transition:all .3s;font-size:17px;font-weight:500;margin-bottom:12px}
.qo:hover{border-color:var(--blue);background:rgba(91,141,238,0.06)}
.qo.ok{border-color:var(--green)!important;background:rgba(78,205,196,0.1)!important}
.qo.no{border-color:var(--red)!important;background:rgba(255,82,82,0.06)!important}
.qo.dn{pointer-events:none}
.qfb{margin-top:16px;padding:20px;border-radius:14px;font-size:17px;line-height:1.8;animation:fadeUp .3s ease}
.qfb.qok{background:rgba(78,205,196,0.08);border:2px solid rgba(78,205,196,0.2)}
.qfb.qno{background:rgba(255,82,82,0.06);border:2px solid rgba(255,82,82,0.15)}
.strat{margin-top:16px;padding:20px;background:rgba(255,215,64,0.05);border:2px solid rgba(255,215,64,0.12);border-radius:14px;font-size:16px}
.strat b{color:var(--yellow);font-size:17px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:768px){.two{grid-template-columns:1fr}}
.ii{background:rgba(91,141,238,0.08);border:2px solid var(--blue);border-radius:10px;padding:10px 16px;color:var(--text);font-family:var(--mono);font-size:16px;outline:none}
.ii.iok{border-color:var(--green)!important}.ii.ino{border-color:var(--red)!important}
.is{background:rgba(91,141,238,0.08);border:2px solid var(--blue);border-radius:10px;padding:10px 14px;color:var(--text);font-family:var(--mono);font-size:15px;cursor:pointer}
.is option{background:var(--card);color:var(--text)}
.conveyor{background:rgba(255,255,255,0.02);border:2px solid var(--border);border-radius:16px;padding:28px;margin:20px 0;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:16px}
.cv{padding:10px 20px;background:rgba(78,205,196,0.12);border:2px solid var(--green);border-radius:10px;color:var(--green);font-weight:700}
.cva{color:var(--yellow);font-size:24px;font-weight:900}

.badge-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:999;background:var(--card2);border:3px solid var(--yellow);border-radius:28px;padding:52px 64px;text-align:center;box-shadow:0 0 100px rgba(255,215,64,0.25);transition:transform .5s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.badge-pop.show{transform:translate(-50%,-50%) scale(1)}
.confetti{position:fixed;border-radius:3px;z-index:9999;pointer-events:none;animation:cfall 3s ease-in forwards}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(900deg);opacity:0}}
.toast{position:fixed;bottom:100px;right:32px;z-index:500;padding:14px 28px;border-radius:60px;font-weight:800;font-size:17px;animation:toastUp 1.8s ease forwards;pointer-events:none;color:var(--yellow);background:rgba(255,215,64,0.12);border:2px solid rgba(255,215,64,0.3)}
@keyframes toastUp{0%{opacity:0;transform:translateY(10px)}15%{opacity:1;transform:translateY(0)}75%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
.xp-float{position:fixed;bottom:24px;right:24px;z-index:50}
.xp-card{background:var(--card);border:2px solid var(--border);border-radius:18px;padding:14px 24px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
.xp-val{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--yellow)}
.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--text2);font-size:16px;font-weight:600;cursor:pointer;margin-bottom:28px}
.back-link:hover{color:var(--blue)}

.foot{text-align:center;padding:60px 0;border-top:1px solid var(--border);font-size:16px;color:var(--text3);z-index:2;position:relative}
.foot span{color:var(--yellow);font-weight:700}

/* Output demonstrations and foundation checks */
.output-demo{margin:22px 0;background:rgba(255,255,255,0.025);border:2px solid rgba(64,224,208,0.18);border-radius:18px;padding:22px}
.flow-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:14px}
.dotstream{display:flex;align-items:center;gap:5px;min-width:150px;height:26px;position:relative}
.dotstream span{width:7px;height:7px;border-radius:50%;background:var(--cyan);opacity:.25;animation:dotPulse 1.8s infinite ease-in-out}
.dotstream span:nth-child(1){animation-delay:.05s}.dotstream span:nth-child(2){animation-delay:.15s}.dotstream span:nth-child(3){animation-delay:.25s}.dotstream span:nth-child(4){animation-delay:.35s}.dotstream span:nth-child(5){animation-delay:.45s}.dotstream span:nth-child(6){animation-delay:.55s}.dotstream span:nth-child(7){animation-delay:.65s}
.dotstream:after{content:'➜';color:var(--yellow);font-size:24px;font-weight:900;margin-left:8px;animation:arrowPush 1.8s infinite ease-in-out}
@keyframes dotPulse{0%,100%{transform:scale(.7);opacity:.2}45%{transform:scale(1.35);opacity:1}}
@keyframes arrowPush{0%,100%{transform:translateX(0);opacity:.45}50%{transform:translateX(10px);opacity:1}}
.monitor{background:#050812;border:3px solid rgba(78,205,196,0.35);border-radius:16px;min-width:220px;min-height:110px;box-shadow:0 0 28px rgba(64,224,208,.1), inset 0 0 25px rgba(64,224,208,.04);position:relative;padding:34px 20px 20px;text-align:center;font-family:var(--mono)}
.monitor:before{content:attr(data-label);position:absolute;top:8px;left:12px;right:12px;text-align:center;font-family:var(--font);font-weight:900;font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:var(--cyan)}
.monitor .screen-value{display:inline-block;color:var(--green);font-size:26px;font-weight:900;animation:riseValue 1.5s infinite ease-in-out}
.monitor .screen-error{display:block;color:var(--red);font-size:15px;line-height:1.6;text-align:left;white-space:pre-wrap;animation:riseValue 1.5s infinite ease-in-out}
@keyframes riseValue{0%{opacity:.2;transform:translateY(14px) scale(.96)}45%,80%{opacity:1;transform:translateY(0) scale(1.03)}100%{opacity:1;transform:translateY(0) scale(1)}}
.note-box{background:rgba(255,215,64,0.07);border:2px solid rgba(255,215,64,0.18);border-radius:16px;padding:18px 20px;margin:18px 0;color:var(--text2)}
.note-box strong{color:var(--yellow)}
.brace-demo{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:stretch;margin:18px 0;background:rgba(255,255,255,.025);border:2px solid rgba(155,109,255,.18);border-radius:18px;padding:18px}
.curly-brace{font-family:Georgia,serif;font-size:118px;line-height:.78;color:var(--purple);animation:braceGrow 1.7s ease-in-out infinite alternate;display:flex;align-items:center}
@keyframes braceGrow{from{transform:scaleY(.82);opacity:.55}to{transform:scaleY(1);opacity:1}}
.brace-lines{display:flex;flex-direction:column;gap:8px;font-family:var(--mono);font-size:16px}
.brace-line{padding:8px 12px;border-radius:10px;background:rgba(155,109,255,.08);border:1px solid rgba(155,109,255,.18)}
.always-line{padding:8px 12px;border-radius:10px;background:rgba(255,215,64,.07);border:1px solid rgba(255,215,64,.18)}
.error-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin:18px 0}
.err-card{background:rgba(255,82,82,.06);border:2px solid rgba(255,82,82,.15);border-radius:16px;padding:16px}
.err-card h4{color:var(--red);font-size:17px;margin-bottom:6px}.err-card p{font-size:15px;margin:0;color:var(--text2)}

@media(max-width:640px){.sgrid{grid-template-columns:1fr}.wrap,.wrap-wide{padding:0 16px}.phase-card,.challenge{padding:28px}}
</style>
</head>
<body>

<div class="badge-pop" id="bp"><span style="font-size:72px;display:block;margin-bottom:16px" id="bpI">🏆</span><div style="font-weight:900;font-size:28px;color:var(--yellow)" id="bpT">Badge!</div><div style="color:var(--text2);font-size:17px;margin-top:8px">You unlocked a new badge!</div></div>

<nav class="topnav" id="topnav"><div class="wrap-wide">
  <div class="logo" onclick="goHome()"><div class="logo-icon">⚗️</div> Function Lab</div>
  <div class="nav-pills">
    <div class="pill">⭐ <span class="pv" id="nXP">0</span> XP</div>
    <div class="pill">🏆 <span class="pv" id="nB">0</span></div>
    <div class="xbar"><div class="xbar-fill" id="nBar" style="width:0%"></div></div>
  </div>
</div></nav>

<div class="xp-float" id="xpFloat"><div class="xp-card">⭐ <span class="xp-val" id="xpD">0</span></div></div>

<main id="app"></main>

<footer class="foot"><div class="wrap">Instructional design by <span>Hilary Homaii</span></div></footer>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const S={xp:0,badges:[],done:[],ans:{},name:'',intake:null,phase:'welcome'};
async function load(){try{const r=await window.storage.get('pfl4');if(r?.value)Object.assign(S,JSON.parse(r.value))}catch(e){}
  if(S.phase==='lab')showLab();else if(S.phase==='prereqs')showPrereqs();else if(S.phase==='intake')startIntake();else showWelcome();
  updUI();}
async function save(){try{await window.storage.set('pfl4',JSON.stringify(S))}catch(e){}}
function addXP(n){S.xp+=n;save();updUI();toast(`+${n} XP`);const e=document.getElementById('xpD');if(e){e.style.transform='scale(1.4)';setTimeout(()=>e.style.transform='',350)}}
function earnBadge(n,ic){if(S.badges.find(b=>b.n===n))return;S.badges.push({n,ic});save();updUI();confetti();const p=document.getElementById('bp');document.getElementById('bpI').textContent=ic;document.getElementById('bpT').textContent=n;p.classList.add('show');setTimeout(()=>p.classList.remove('show'),3000)}
function fin(i){if(!S.done.includes(i)){S.done.push(i);save();updUI()}}
function updUI(){
  const x=document.getElementById('xpD'),nb=document.getElementById('nB'),nx=document.getElementById('nXP');
  if(x)x.textContent=S.xp;if(nb)nb.textContent=S.badges.length;if(nx)nx.textContent=S.xp;
  const p=Math.round(S.done.length/12*100);
  const b=document.getElementById('nBar');if(b)b.style.width=p+'%';
}
function confetti(){const cols=['#5b8dee','#9b6dff','#4ecdc4','#ff8a50','#ff6b9d','#ffd740','#40e0d0','#ff5252'];for(let i=0;i<55;i++){const p=document.createElement('div');p.className='confetti';p.style.cssText=`left:${Math.random()*100}vw;background:${cols[~~(Math.random()*cols.length)]};animation-delay:${Math.random()*.7}s;width:${7+Math.random()*10}px;height:${7+Math.random()*10}px;top:-20px`;document.body.appendChild(p);setTimeout(()=>p.remove(),3800)}}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000)}
function hl(t){
  // Step 1: Escape only & and < (> is safe in HTML text content)
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  // Step 2: Strings first (so keywords inside strings aren't highlighted)
  t = t.replace(/(["'])(.*?)\1/g,'<span class="st">$1$2$1</span>');
  // Step 3: Comments
  t = t.replace(/(#[^<]*)/g,'<span class="cm">$1</span>');
  // Step 4: Keywords (only outside of already-wrapped spans)
  t = t.replace(/\b(def|return|import|if|else|elif|for|while|in|and|or|not|True|False|None)\b/g,'<span class="kw">$1</span>');
  // Step 5: Built-in functions
  t = t.replace(/\b(print|input|int|float|str|len|sum|max|min|round|range|type|abs)\b(?=\()/g,'<span class="bi">$1</span>');
  // Step 6: Numbers
  t = t.replace(/\b(\d+\.?\d*)\b/g,'<span class="nm">$1</span>');
  // Step 7: module names
  t = t.replace(/\b(math|random)\b/g,'<span class="bi">$1</span>');
  return t;
}
function cS(ls){return`<div class="code">${ls.map((l,i)=>`<span class="line"><span class="ln">${i+1}</span>${hl(l||' ')}</span>`).join('\n')}</div>`}

function outputDemo(codeLines, output, label='Your screen will display'){
  const isError = /Error|Traceback|invalid syntax|not defined/i.test(output);
  const value = isError ? `<span class="screen-error">${output.replace(/</g,'&lt;')}</span>` : `<span class="screen-value">${output}</span>`;
  return `<div class="output-demo">${cS(codeLines)}<div class="flow-row"><div class="dotstream"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="monitor" data-label="${label}">${value}</div></div></div>`;
}
function explainBox(text){return `<div class="note-box"><strong>What this means:</strong> ${text}</div>`}
function braceDemo(){return `<div class="brace-demo"><div class="curly-brace">{</div><div class="brace-lines"><div class="brace-line">print("Adult") <span style="color:var(--green)">inside the if</span></div><div class="brace-line">print("Can vote") <span style="color:var(--green)">also inside</span></div><div class="always-line">print("Done") <span style="color:var(--yellow)">outside; always runs</span></div></div></div>`}

const INTAKE=[
  {q:"Which of these correctly stores the number 25 in a variable called <code>age</code>?",code:[],
    opts:["<code>age = 25</code>","<code>age == 25</code>","<code>25 = age</code>","<code>age : 25</code>"],
    correct:0,area:'variables',
    fb:["Correct. A single <code>=</code> stores a value. <code>age = 25</code> creates the variable <code>age</code> and puts 25 inside it.","<code>==</code> compares two things. It asks, <em>Is age equal to 25?</em> It does not store anything. Use one <code>=</code> for storage and two <code>==</code> for comparison.","The storage name must be on the left. Python reads this as: put the right-side value into the left-side variable name.","A colon starts a block after words like <code>if</code>, <code>for</code>, and <code>def</code>. It does not store a value in a variable."]},
  {q:"A variable <code>name</code> stores <code>\"Maya\"</code>. Which code displays <strong>Hello Maya</strong> on screen?",code:['name = "Maya"'],
    opts:["<code>print(\"Hello\", name)</code>","<code>display(\"Hello\", name)</code>","<code>print Hello, name</code>","<code>print(\"Hello\", \"name\")</code>"],
    correct:0,area:'print',
    fb:["Correct. <code>print()</code> displays output. <code>name</code> has no quotes, so Python opens the variable and uses the value inside it: Maya.","<code>display</code> is not the basic Python command for screen output in this lesson. Use <code>print()</code>.","Python 3 requires parentheses with <code>print()</code>. Without parentheses, the line is not valid Python syntax.","Quotes change the meaning. <code>\"name\"</code> is the literal word name; <code>name</code> without quotes means Python should look inside the variable."]},
  {q:"Which of these code blocks will run <strong>without</strong> causing an error?",code:[],
    opts:[
      "<code>if score > 90:<br>&nbsp;&nbsp;&nbsp;&nbsp;print(\"Great!\")</code>",
      "<code>if score > 90<br>&nbsp;&nbsp;&nbsp;&nbsp;print(\"Great!\")</code>",
      "<code>if score > 90:<br>print(\"Great!\")</code>",
      "<code>if (score > 90)<br>&nbsp;&nbsp;&nbsp;&nbsp;print(\"Great!\")</code>"
    ],
    correct:0,area:'indent',
    fb:["Correct. It has the required pieces: <code>if</code>, a condition, a colon, and an indented line that belongs inside the <code>if</code> block.","The colon is missing. Python needs <code>:</code> before the indented block begins.","The colon is present, but the action line is not indented. Python cannot tell what belongs inside the <code>if</code> block.","Parentheses around the condition are optional, but the colon is not optional. This line is missing <code>:</code>."]},
  {q:"Which line correctly stores the calculation in a variable named <code>result</code> without displaying it yet?",code:[],
    opts:["<code>result = 5 + 3 * 2</code>","<code>print(5 + 3 * 2)</code>","<code>result: 5 + 3 * 2</code>","<code>result == 5 + 3 * 2</code>"],

    fb:["Correct. This stores the calculated value in <code>result</code>. It does not display anything until you write <code>print(result)</code>.","This displays the calculation on the screen, but it does not store the value in a variable named <code>result</code>.","A colon does not store the answer. Use <code>=</code> when you want Python to save a value in a variable.","<code>==</code> compares; it does not store. This asks whether <code>result</code> is equal to that expression, and it can also fail if <code>result</code> was never created."]},
  {q:"A student wrote four programs. Which one will <strong>cause an error</strong> when they click Run?",code:[],
    opts:[
      "<code>greeting = \"Hello\"<br>print(greeting)</code>",

      "<code>print(message)</code>",

let intakeStep=0;
let intakeScore={variables:0,print:0,indent:0,expressions:0,errors:0,running:0};

function startIntake(){
  S.name=document.getElementById('nameInput')?.value||'Explorer';
  S.phase='intake';save();
  intakeStep=0;
  intakeScore={variables:0,print:0,indent:0,expressions:0,errors:0,running:0};
  document.getElementById('topnav').style.display='none';
  document.getElementById('xpFloat').style.display='none';
  scrollTo(0,0);
  renderIntakeStep();
}

function renderIntakeStep(){
  if(intakeStep>=INTAKE.length){finishIntake();return}
  const q=INTAKE[intakeStep];
  const dots=INTAKE.map((_,i)=>`<div class="dot${i<intakeStep?' done':i===intakeStep?' active':''}"></div>`).join('');
  document.getElementById('app').innerHTML=`
  <div class="phase"><div class="wrap"><div class="challenge">
    <div class="dots">${dots}</div>
    <div class="ch-num">Warm-Up ${intakeStep+1} of ${INTAKE.length}</div>
    <h2>${q.q}</h2>
    ${q.code.length ? cS(q.code) : ''}
    <div class="ch-options" id="chOpts">
      ${q.opts.map((o,i)=>`<div class="ch-opt" onclick="pickIntake(${intakeStep},${i})">${o}</div>`).join('')}
    </div>
    <div id="chFb"></div>
  </div></div></div>`;
}

function pickIntake(step,sel){
  const q=INTAKE[step];
  const opts=document.querySelectorAll('#chOpts .ch-opt');
  opts.forEach((o,i)=>{
    o.classList.add('done');
    if(i===q.correct)o.classList.add('correct');
    if(i===sel&&sel!==q.correct)o.classList.add('wrong');
  });
  const ok=sel===q.correct;
  if(ok){intakeScore[q.area]=1;addXP(5)}
  document.getElementById('chFb').innerHTML=`
    <div class="ch-fb ${ok?'ok':'no'}"><strong>${ok?'✓ Correct.':'Not quite.'}</strong> ${q.fb[sel]}</div>
    <div style="text-align:center;margin-top:20px"><button class="btn btn-blue btn-sm" onclick="intakeStep++;renderIntakeStep()">Continue →</button></div>`;
}

function finishIntake(){
  const total=Object.values(intakeScore).reduce((a,b)=>a+b,0);
  const pct=Math.round(total/6*100);
  const level=pct>=80?'ready':pct>=50?'almost':'building';
  S.intake={score:total,areas:Object.fromEntries(Object.entries(intakeScore).map(([k,v])=>[k,v===1]))};
  S.phase=level==='ready'?'lab':'prereqs';save();

  const weak=Object.entries(intakeScore).filter(([_,v])=>v===0).map(([k])=>k);
  const strong=Object.entries(intakeScore).filter(([_,v])=>v===1).map(([k])=>k);

  document.getElementById('app').innerHTML=`
  <div class="phase"><div class="wrap"><div class="phase-card" style="max-width:800px">
    <div style="font-size:56px;margin-bottom:16px">${level==='ready'?'🚀':level==='almost'?'💪':'🌱'}</div>
    <h1>${S.name}, here's your starting point!</h1>
    <p style="font-size:18px">You got <strong style="color:var(--text)">${total} out of 6</strong> warm-up challenges correct.</p>
    <div class="result-bar"><div class="result-fill ${pct>=80?'high':pct>=50?'med':'low'}" style="width:${pct}%"></div></div>
    ${strong.length?`<p style="color:var(--green);font-size:16px;margin-bottom:8px">✓ Solid on: ${strong.map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join(', ')}</p>`:''}
    ${weak.length?`<p style="color:var(--orange);font-size:16px;margin-bottom:8px">⚡ Could use review: ${weak.map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join(', ')}</p>`:''}
    <div style="margin-top:32px">
      ${level==='ready'?`
        <p style="color:var(--green);font-size:20px;font-weight:700;margin-bottom:16px">🚀 You're ready for the Function Lab!</p>
        <button class="btn btn-green" onclick="showLab()">Enter the Lab →</button>
      `:level==='almost'?`
        <p style="font-size:18px;margin-bottom:16px">We recommend a quick refresher on a few concepts before diving into functions.</p>
        <button class="btn btn-gold" onclick="showPrereqs()">Quick Refresher →</button>
        <div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="showLab()">Skip to Lab anyway →</button></div>
      `:`
        <p style="font-size:18px;margin-bottom:16px">No worries! Let's build your foundation first. These quick mini-lessons will get you ready.</p>
        <button class="btn btn-gold" onclick="showPrereqs()">Build My Foundation →</button>
      `}
    </div>
  </div></div></div>`;
}

function st5(){return`

<p><strong>Argument</strong> = the value you send. <strong>Parameter</strong> = the variable inside that catches it.</p>
<div class="conveyor"><div class="cv">"Maya"</div><div class="cva">→→→</div><div style="padding:10px 20px;background:rgba(155,109,255,0.1);border:2px solid var(--purple);border-radius:10px;color:var(--purple);font-weight:700;font-family:var(--mono)">greet(name)</div><div class="cva">→</div><div style="color:var(--green);font-weight:700;font-size:17px;font-family:var(--mono)">name = "Maya" ✓</div></div></div>

${Q('s5q1','In <code>calc(100, 0.08, 5)</code>, the 2nd parameter receives:',
  ['100','0.08','5','Nothing'],1,
  ['100 → 1st parameter.','Correct! By position: 1st arg→1st param, 2nd→2nd, 3rd→3rd.','5 → 3rd parameter.','It does receive 0.08.'],
  'Arguments match parameters by POSITION. Count left to right.')}
`}

${Q('s9q1','How to call sqrt from math?',['sqrt(16)','math.sqrt(16)','math(sqrt,16)','import sqrt'],1,
